<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc"><title id="title">Joint popping education image</title><desc id="desc">Clean orthopedic illustration showing cartilage, joint fluid, a gas bubble, and tendon movement as common causes of joint popping.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#eef7ff"/></linearGradient><linearGradient id="bone" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff7e6"/><stop offset="1" stop-color="#d8ad74"/></linearGradient><linearGradient id="cart" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#bff5ee"/><stop offset="1" stop-color="#14b8a6"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0b1f3a" flood-opacity=".14"/></filter><style>.t{font-family:Inter,Arial,sans-serif;font-weight:900;fill:#0b1f3a}.l{font-family:Inter,Arial,sans-serif;font-weight:850;fill:#475569}.call{fill:#fff;stroke:#d7e7f5;stroke-width:4}</style></defs><rect width="1600" height="1000" fill="url(#bg)"/><circle cx="1280" cy="130" r="230" fill="#dff7fb" opacity=".45"/><circle cx="230" cy="880" r="240" fill="#dbeafe" opacity=".55"/><text x="90" y="120" class="t" font-size="58">Why joints pop and crack</text><text x="94" y="172" class="l" font-size="30">Common painless causes: joint fluid pressure, gas bubbles, and tendon movement.</text><g filter="url(#s)"><path d="M390 360 C430 260 540 208 656 246 C734 272 777 332 797 402 C721 438 647 454 572 445 C498 436 437 408 390 360Z" fill="url(#bone)"/><path d="M825 405 C846 323 903 263 994 246 C1110 222 1215 279 1250 380 C1195 427 1125 452 1042 451 C964 450 891 433 825 405Z" fill="url(#bone)"/><path d="M492 371 C580 407 694 405 784 365 C801 402 809 433 809 467 C695 507 573 508 456 465 C456 430 469 398 492 371Z" fill="url(#cart)"/><path d="M838 366 C943 411 1074 412 1183 371 C1207 401 1220 434 1221 468 C1097 508 958 506 829 463 C828 429 831 398 838 366Z" fill="url(#cart)"/><ellipse cx="817" cy="508" rx="170" ry="78" fill="#cfeefb" opacity=".78"/><circle cx="810" cy="500" r="43" fill="#ffffff" stroke="#1e5bd8" stroke-width="7" opacity=".95"/><circle cx="850" cy="542" r="18" fill="#ffffff" stroke="#1e5bd8" stroke-width="5" opacity=".9"/><path d="M336 560 C500 520 620 548 742 591 C876 638 1024 651 1266 573" fill="none" stroke="#6d4b32" stroke-width="28" stroke-linecap="round" opacity=".78"/><path d="M336 560 C500 520 620 548 742 591 C876 638 1024 651 1266 573" fill="none" stroke="#fff7dc" stroke-width="13" stroke-linecap="round" opacity=".9"/></g><g><rect class="call" x="180" y="700" width="300" height="90" rx="26"/><text x="215" y="755" class="t" font-size="30">Cartilage</text><rect class="call" x="530" y="705" width="330" height="90" rx="26"/><text x="568" y="760" class="t" font-size="30">Joint fluid</text><rect class="call" x="910" y="705" width="315" height="90" rx="26"/><text x="948" y="760" class="t" font-size="30">Gas bubble</text><rect class="call" x="1255" y="700" width="235" height="90" rx="26"/><text x="1292" y="755" class="t" font-size="30">Tendon</text></g></svg>