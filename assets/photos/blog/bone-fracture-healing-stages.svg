  <text class="label" x="100" y="1015">Fracture</text>
  <text class="label" x="421" y="1015">Early Callus</text>
  <text class="time" x="438" y="1050">days to weeks</text>
  <text class="label" x="748" y="1015">Hard Callus</text>
  <text class="time" x="795" y="1050">weeks</text>
  <text class="label" x="1091" y="1015">Remodeling</text>
  <text class="time" x="1137" y="1050">months</text>
