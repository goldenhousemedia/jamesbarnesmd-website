      <circle cx="28" cy="24" r="7" fill="none" stroke="#9b6a37" stroke-width="2" opacity="0.45"/>
      <path d="M3 37 C13 29 22 41 41 30 M8 4 C17 18 26 6 40 16" fill="none" stroke="#9b6a37" stroke-width="2" opacity="0.35"/>
    </pattern>
    <style>
      .label{font-family:Inter,Arial,sans-serif;font-weight:900;fill:#0b1f3a;font-size:38px}.time{font-family:Inter,Arial,sans-serif;font-style:italic;fill:#1e5bd8;font-size:28px}.num{font-family:Inter,Arial,sans-serif;font-weight:900;fill:white;font-size:40px}.small{font-family:Inter,Arial,sans-serif;fill:#64748b;font-size:22px}.arrow{fill:#86b7ef}.badge{fill:#1e91e6;stroke:#ffffff;stroke-width:8;filter:url(#shadow)}
    </style>
