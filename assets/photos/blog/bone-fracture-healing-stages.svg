    <linearGradient id="bone" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff3d8"/><stop offset="0.45" stop-color="#e9c993"/><stop offset="1" stop-color="#b98245"/></linearGradient>
    <linearGradient id="cortex" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff8e8"/><stop offset="1" stop-color="#d9ad70"/></linearGradient>
    <linearGradient id="callusSoft" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffd2c8"/><stop offset="1" stop-color="#d97968"/></linearGradient>
    <linearGradient id="callusHard" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff1cd"/><stop offset="1" stop-color="#d8ab68"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0b1f3a" flood-opacity="0.13"/></filter>
