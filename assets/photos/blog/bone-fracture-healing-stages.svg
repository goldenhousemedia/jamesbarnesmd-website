<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1448 1086" role="img" aria-labelledby="title desc">
  <title id="title">Stages of bone fracture healing</title>
  <desc id="desc">Orthopedic education illustration showing fracture, early callus, hard callus, and remodeling stages of bone healing.</desc>
  <defs>
