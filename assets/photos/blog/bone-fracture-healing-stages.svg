    <circle class="badge" cx="522" cy="932" r="42"/><text class="num" x="510" y="946">2</text>
    <circle class="badge" cx="856" cy="932" r="42"/><text class="num" x="844" y="946">3</text>
    <circle class="badge" cx="1190" cy="932" r="42"/><text class="num" x="1178" y="946">4</text>
    <circle cx="356" cy="932" r="9" fill="#ffffff" stroke="#2b91dc" stroke-width="5"/><circle cx="689" cy="932" r="9" fill="#ffffff" stroke="#2b91dc" stroke-width="5"/><circle cx="1023" cy="932" r="9" fill="#ffffff" stroke="#2b91dc" stroke-width="5"/>
